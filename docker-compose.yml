version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_DB: day33db
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets:
      - pg_password
    deploy:
      restart_policy:
        condition: any

secrets:
  pg_password:
    external: true
